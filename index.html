<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>akira Love</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: url('reze.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* TEXTO */
.texto {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Great Vibes', cursive;
    font-size: 90px;
    color: pink;
    text-shadow: 0 0 25px rgba(255,255,255,0.9);
    pointer-events: none;
   // mix-blend-mode: screen;
   // mix-blend-mode: overlay;
}

/* PLAYER */
.player {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    
    width: 320px;
    padding: 15px;

    background-color: black;

    border-radius: 15px;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.1);
    color: pink;

    text-align: center;
    font-family: sans-serif;
}

.player button {
    background: none;
    border: none;
    font-size: 28px;
    color: white;
    cursor: pointer;
    margin: 10px 0;
}

.barra {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
    overflow: hidden;
}

.progresso {
    width: 0%;
    height: 100%;
    background: #ff69b4;
}

/* PÉTALAS */
.petala {
    position: fixed;
    top: -20px;
    width: 20px;
    height: 25px;
    opacity: 0.9;

    clip-path: path("M10 0 C15 5, 20 15, 10 25 C0 15, 5 5, 10 0 Z");
}

.rosa {
    background: radial-gradient(circle at 30% 30%, #ffc0cb, #ff69b4);
    box-shadow: 0 0 10px #ff69b4;
}

.branca {
    background: radial-gradient(circle at 30% 30%, #ffffff, #dddddd);
    box-shadow: 0 0 8px #ffffff;
}
</style>
</head>

<body>

<div class="texto" id="texto">I luv u, Akira</div>

<!-- PLAYER -->
<div class="player">
    <div id="texto_player">Clique</div>
    <button id="playBtn"></button>
    <div class="barra">
        <div class="progresso" id="progresso"></div>
    </div>
</div>

<audio id="bgm">
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
const texto_player = document.getElementById("#texto_player")
const texto = document.getElementById("texto");

/* PÉTALAS */
function criarPetala() {
    const petala = document.createElement("div");
    petala.classList.add("petala");

    if (Math.random() > 0.5) {
        petala.classList.add("rosa");
    } else {
        petala.classList.add("branca");
    }

    let x = Math.random() * window.innerWidth;
    let y = -20;

    let velocidadeY = 1 + Math.random() * 1.5;
    let velocidadeX = (Math.random() - 0.5) * 1;

    document.body.appendChild(petala);

    function animar() {
        y += velocidadeY;
        x += velocidadeX;

        const rect = texto.getBoundingClientRect();

        /* colisão com texto
        if (
            x > rect.left &&
            x < rect.right &&
            y > rect.top &&
            y < rect.bottom
        ) {
            velocidadeX += (Math.random() - 0.5) * 4;
            velocidadeY *= 0.7;
            y -= 10;
        }*/

        petala.style.transform = `translate(${x}px, ${y}px) rotate(${y}deg)`;

        if (y < window.innerHeight) {
            requestAnimationFrame(animar);
        } else {
            petala.remove();
        }
    }

    animar();

    setTimeout(() => petala.remove(), 5000);
}

setInterval(criarPetala, 150);

/* PLAYER */
const audio = document.getElementById("bgm");
const playBtn = document.getElementById("playBtn");
const progresso = document.getElementById("progresso");

document.addEventListener("click", () => {
    if (audio.paused) {
        audio.play();
        playBtn.textContent = "In The Pool";
        tocando = true;
	//texto_player.textContent = "<p>Te amo</p>"
    }
});

let tocando = false;

playBtn.addEventListener("click", () => {
   
   texto_player.textContent = "<p>Te amo</p>"
   

    if (tocando) {
        audio.pause();
        playBtn.textContent = "";
    } else {
        audio.play();
        playBtn.textContent = "clique";
    }
    tocando = !tocando;
});

// barra
audio.addEventListener("timeupdate", () => {
    if (audio.duration) {
        const percent = (audio.currentTime / audio.duration) * 100;
        progresso.style.width = percent + "%";
    }
});

// autoplay
window.addEventListener("load", () => {
    audio.volume = 0;
    audio.play().then(() => {
        let v = 0;
        const fade = setInterval(() => {
            if (v < 0.5) {
                v += 0.02;
                audio.volume = v;
            } else {
                clearInterval(fade);
            }
        }, 200);
        playBtn.textContent = "";
        tocando = true;
    }).catch(() => {});
});

document.addEventListener("click", () => {
    if (!tocando) {
        audio.play();
        playBtn.textContent = "⏸";
        tocando = true;
    }
});
</script>

</body>
</html>
